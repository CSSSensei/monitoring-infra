global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['127.0.0.1:9093']

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['127.0.0.1:9090']


  - job_name: vipsubbot
    static_configs:
      - targets: ['localhost:9101']
        labels:
          bot: vipsubbot

  - job_name: manicure
    static_configs:
      - targets: ['localhost:9102']
        labels:
          bot: manicure

  - job_name: pptpibot
    static_configs:
      - targets: ['localhost:9103']
        labels:
          bot: pptpi

  - job_name: node
    static_configs:
      - targets: ['localhost:9100']

  - job_name: proxy
    static_configs:
      - targets: ['localhost:9200']
