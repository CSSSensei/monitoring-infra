global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: vipsubbot
    static_configs:
      - targets: ['localhost:9101']
        labels:
          bot: vipsubbot

  - job_name: manicure
    static_configs:
      - targets: ['localhost:9102']
        labels:
          bot: manicure

  - job_name: node
    static_configs:
      - targets: ['localhost:9100']

  - job_name: proxy
    static_configs:
      - targets: ['localhost:9200']
